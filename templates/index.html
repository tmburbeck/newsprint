<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Daily Newsprint</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="masthead">
        <h1>The Daily Newsprint</h1>
        <p>All the news fit to print</p>
    </div>

    <div class="lead-story">
        <p class="source">{{ lead.source }}</p>
        <h2><a href="{{ lead.link }}">{{ lead.title }}</a></h2>
        <p class="summary">{{ lead.summary }}</p>
        <p class="date">{{ lead.published }}</p>
    </div>

    <hr class="section-rule">

    <div class="articles">
        {% for article in articles %}
        <div class="article">
            <p class="source">{{ article.source }}</p>
            <h2><a href="{{ article.link }}">{{ article.title }}</a></h2>
            <p class="summary">{{ article.summary }}</p>
            <p class="date">{{ article.published }}</p>
            <hr>
        </div>
        {% endfor %}
    </div>

</body>
</html>
